<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1A2F5E">
  <meta name="description" content="California PC, VC, H&S, B&P field reference for law enforcement">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CA Legal Codes">
  <title>CA Legal Code Reference Guide</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── Sticky header ─────────────────────────────────── -->
  <header id="app-header">
    <div class="header-top">
      <div class="header-title">
        <span class="star-icon" aria-hidden="true">★</span>
        <span>CA Legal Code Reference Guide</span>
      </div>
      <div class="header-actions">
        <button id="browse-btn" class="browse-btn" aria-label="Browse by category" title="Browse categories">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <rect x="1" y="1" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="11" y="1" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="1" y="11" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="11" y="11" width="6" height="6" rx="1" fill="currentColor"/>
          </svg>
        </button>
        <span id="status-dot" class="status-dot online" title="Online"></span>
      </div>
    </div>

    <div class="search-row">
      <label for="search-input" class="sr-only">Search by section number or keyword</label>
      <input
        id="search-input"
        type="search"
        inputmode="search"
        placeholder="187, PC 187, VC 23152, DUI, murder…"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      >
      <button id="clear-btn" hidden aria-label="Clear search">✕</button>
    </div>

    <div class="filter-row" role="group" aria-label="Filter by code">
      <button class="filter-pill active" data-code="ALL">All</button>
      <button class="filter-pill" data-code="PEN">PC</button>
      <button class="filter-pill" data-code="VEH">VC</button>
      <button class="filter-pill" data-code="HSC">H&amp;S</button>
      <button class="filter-pill" data-code="BPC">B&amp;P</button>
      <button class="filter-pill" data-code="EMC">EMC</button>
    </div>
  </header>

  <!-- ── Offline banner ─────────────────────────────────── -->
  <div id="offline-banner" hidden role="alert" aria-live="assertive">
    ⚠ Offline — showing cached data
  </div>

  <!-- ── Active category bar ──────────────────────────────── -->
  <div id="cat-bar" hidden>
    <span id="cat-bar-label"></span>
    <button id="clear-cat-btn" aria-label="Clear category filter">✕</button>
  </div>

  <!-- ── Main results ───────────────────────────────────── -->
  <main id="main-content">
    <div id="loading" aria-label="Loading code database">
      <div class="spinner" aria-hidden="true"></div>
      <span>Loading code database…</span>
    </div>

    <p id="results-count" aria-live="polite" aria-atomic="true" hidden></p>

    <div id="results-list" role="list" aria-label="Search results"></div>

    <div id="no-results" hidden>
      <!-- Populated dynamically by showNoResults() -->
    </div>
  </main>

  <!-- ── Full-screen section detail ───────────────────────── -->
  <div
    id="detail-overlay"
    hidden
    role="dialog"
    aria-modal="true"
    aria-labelledby="detail-title"
    tabindex="-1"
  >
    <div class="detail-header">
      <button id="back-btn" aria-label="Back to results">← Back</button>
      <h1 id="detail-title" class="detail-title"></h1>
      <span id="detail-badge" class="offense-badge"></span>
    </div>

    <div class="detail-body">
      <p id="detail-breadcrumb" class="detail-breadcrumb"></p>
      <div id="detail-text" class="detail-text"></div>
      <div class="detail-footer">
        <a id="source-link" class="source-link" href="#" target="_blank" rel="noopener noreferrer">
          View on leginfo.legislature.ca.gov ↗
        </a>
      </div>
    </div>
  </div>

  <!-- ── Browse categories overlay ────────────────────────── -->
  <div id="cat-overlay" hidden role="dialog" aria-modal="true"
       aria-labelledby="cat-overlay-title" tabindex="-1">
    <div class="cat-overlay-header">
      <button id="cat-back-btn" aria-label="Back to search">← Back</button>
      <h1 id="cat-overlay-title">Browse Categories</h1>
    </div>
    <div class="cat-overlay-body">
      <div id="cat-list"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
